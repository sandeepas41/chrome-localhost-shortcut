<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- URL List View -->
    <div id="list-view">
      <div id="url-list"></div>
      <div id="empty-state" class="hidden">
        <p>No URLs configured</p>
        <p class="hint">Click + to add your first URL</p>
      </div>
      <button id="add-btn" title="Add URL">+</button>
    </div>

    <!-- Children Preview Panel (appears to the right) -->
    <div id="children-preview" class="hidden"></div>

    <!-- Add/Edit Form View -->
    <div id="form-view" class="hidden">
      <h3 id="form-title">Add URL</h3>
      <input type="text" id="url-input" placeholder="http://localhost:3000" autofocus>
      <input type="text" id="label-input" placeholder="Label (optional)">
      <div class="form-actions">
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn" class="primary">Save</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
